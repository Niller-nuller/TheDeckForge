<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opret konto — Deckforge</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <span class="hero-eyebrow">✦ Tilslut dig ✦</span>
            <h1>Opret konto</h1>
            <p class="auth-subtitle">Bliv en del af samlingen</p>
        </div>

        <form th:action="@{/register}" th:object="${user}" method="post">
            <div class="form-field">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" th:field="*{authority.email}"
                       class="form-input" placeholder="dig@example.com" required autofocus>
            </div>

            <div class="form-field">
                <label for="password" class="form-label">Adgangskode</label>
                <input type="password" id="password" th:field="*{authority.password}"
                       class="form-input" placeholder="Vælg en stærk adgangskode" required>
            </div>

            <div class="form-field">
                <label for="name" class="form-label">Navn</label>
                <input type="text" id="name" th:field="*{name}"
                       class="form-input" placeholder="Dit fulde navn" required>
            </div>

            <div class="form-field">
                <label for="dateOfBirth" class="form-label">Fødselsdato</label>
                <input type="date" id="dateOfBirth" th:field="*{dateOfBirth}"
                       class="form-input" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Opret konto</button>
            </div>
        </form>

        <div class="auth-divider">eller</div>

        <p class="auth-footer">
            Har du allerede en konto? <a th:href="@{/login}">Log ind</a>
        </p>
    </div>
</section>

</body>
</html>
