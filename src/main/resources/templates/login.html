<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log ind</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <h1>Vær sød at logge ind</h1>
    <form th:action="@{/login}" th:object="${Authority}" method="post">
        <label for="email">Email:</label><br>
        <input type="text" id="email" th:field="*{username}" required><br><br>

        <label for="password">Password:</label><br>
        <input type="password" id="password" th:field="*{password}" required><br><br>

        <button type="submit">Log ind</button>
        <a th:href="@{/register}" class="navbar-link navbar-link--accent">Register</a>
    </form>
</div>
<h3> <a th:href="@{/}">Home</a></h3>
</body>
</html>
