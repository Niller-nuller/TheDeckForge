<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log ind — Deckforge</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <span class="hero-eyebrow">✦ Velkommen tilbage ✦</span>
            <h1>Log ind</h1>
            <p class="auth-subtitle">Træd ind i samlingen igen</p>
        </div>

        <div th:if="${param.error}" class="auth-divider" style="color: var(--rarity-mythic);">
            Forkert email eller adgangskode
        </div>

        <form th:action="@{/login}" th:object="${Authority}" method="post">
            <div class="form-field">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" th:field="*{email}"
                       class="form-input" placeholder="dig@example.com" required autofocus>
            </div>

            <div class="form-field">
                <label for="password" class="form-label">Adgangskode</label>
                <input type="password" id="password" th:field="*{password}"
                       class="form-input" placeholder="••••••••" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Log ind</button>
            </div>
        </form>

        <div class="auth-divider">eller</div>

        <p class="auth-footer">
            Ikke medlem endnu? <a th:href="@{/register}">Opret en konto</a>
        </p>
    </div>
</section>

</body>
</html>
