<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Card List</title>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
    <div>
        <h1>Card List</h1>

            <div class="card-seachbar">
                <form class="seach-bar" th:action="@{/cards/card-list}" method="get">
                    <label>
                        <input type="text" name="searchTerm" placeholder="Search For Cards..">
                    </label>
                    <button type="submit">Search</button>
                </form>
            </div>

            <h3>Card List</h3>
                <div th:if="${#lists.isEmpty(searchResults)}">
                    <p>No cards found...</p>
                </div>
            <div th:if="${!#lists.isEmpty(searchResults)}">
                <div th:each="card : ${searchResults}" th:object="${card}">
                    <table class="card-table">
                        <tbody>
                        <tr>
                            <td th:text="${card.cardName}"></td>
                            <td><a th:href="@{/cards/card-detail/{id}(id=${card.id})}">
                                <img th:src="${card.getPictureRef()}" alt="oh no">
                            </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
    <h4> <a th:href="@{/}">Home</a></h4>


</div>
</body>
</html>
